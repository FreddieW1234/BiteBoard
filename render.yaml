services:
  - type: web
    name: shopify-component-toolkit
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn app:app --chdir backend --bind 0.0.0.0:$PORT --timeout 300
    autoDeploy: true
    envVars:
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2025-07"
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: OFFICE_API_URL
        sync: false
      - key: OFFICE_API_KEY
        sync: false
      - key: KLAVIYO_API_KEY
        sync: false
      - key: KLAVIYO_METRIC_NAME
        value: "Bite Production Update"
      - key: KLAVIYO_CUSTOMER_TYPE_METRIC_NAME
        value: "Bite Customer Type Assigned"
      - key: KLAVIYO_CUSTOMER_REGISTERED_METRIC_NAME
        value: "Bite Customer Registered"
      - key: KLAVIYO_API_REVISION
        value: "2025-01-15"
      - key: PORTAL_PAGE_URL
        value: "https://bitepromotions.uk/pages/portal"
      - key: CUSTOMER_LOGIN_RETURN_TO
        value: "/pages/portal"
      - key: ROYAL_MAIL_API_KEY
        sync: false
      - key: ROYAL_MAIL_API_URL
        sync: false
      - key: FEDEX_API_KEY
        sync: false
      - key: FEDEX_API_URL
        sync: false
      - key: FEDEX_ACCOUNT_NUMBER
        sync: false
      - key: FEDEX_CLIENT_ID
        sync: false
      - key: FEDEX_CLIENT_SECRET
        sync: false
      # Optional FedEx label tuning (defaults: STOCK_4X6, TOP_EDGE_OF_TEXT_FIRST)
      - key: FEDEX_LABEL_STOCK_TYPE
        sync: false
      - key: FEDEX_LABEL_PRINTING_ORIENTATION
        sync: false
      - key: FEDEX_LABEL_ROTATION
        sync: false
      # Print layout tuning (applied on every print/reprint; restart after changing)
      - key: FEDEX_LABEL_SHIFT_MM
        sync: false
      - key: FEDEX_LABEL_SCALE
        sync: false
      # Print-time 180° flip (^POI). Use this OR FEDEX_LABEL_ROTATION below — not both.
      - key: FEDEX_LABEL_PRINT_ROTATE_180
        sync: false
      - key: PALLETWAYS_API_KEY
        sync: false
      - key: SHIP_FROM_NAME
        sync: false
      - key: SHIP_FROM_PHONE
        sync: false
      - key: SHIP_FROM_LINE1
        sync: false
      - key: SHIP_FROM_LINE2
        sync: false
      - key: SHIP_FROM_CITY
        sync: false
      - key: SHIP_FROM_STATE
        sync: false
      - key: SHIP_FROM_POSTCODE
        sync: false
      - key: SHIP_FROM_COUNTRY
        value: "GB"
      - key: OFFICE_PRINT_SERVER_URL
        sync: false
      - key: OFFICE_PRINT_SERVER_KEY
        sync: false

