services:
  - type: web
    name: shopify-component-toolkit
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn app:app --chdir backend --bind 0.0.0.0:$PORT --timeout 300
    autoDeploy: true
    envVars:
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2025-07"
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: OFFICE_API_URL
        sync: false
      - key: OFFICE_API_KEY
        sync: false
      - key: KLAVIYO_API_KEY
        sync: false
      - key: KLAVIYO_METRIC_NAME
        value: "Bite Production Update"
      - key: KLAVIYO_API_REVISION
        value: "2025-01-15"

