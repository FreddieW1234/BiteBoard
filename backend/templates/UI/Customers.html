    <style>

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f8fa; min-height: 100vh; color: #1f2937; }

        .cust-table tbody tr.cu-row.expanded:hover td.col-expand { background: #eef2ff !important; }
        .cust-table tbody tr.row-conflict:hover td.col-name,
        .cust-table tbody tr.row-conflict:hover td.col-expand { background: #fee2e2; }
        .cust-table th.col-name,
        .cust-table td.col-name {

            max-width: 200px;

        .cust-table th.col-name { z-index: 4; background: #f8fafc; }
        .cust-table th.col-expand,

            z-index: 3;

        .cust-table th.col-expand { z-index: 4; background: #f8fafc; }
        .cust-table td.col-email { max-width: 200px; }

        .cust-table td.col-email,
        .cust-table td.col-company,

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #9ca3af;
            margin: 0 0 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e5e7eb;
        }
        .cu-orders-modal-body .order-info-group + .order-info-group .order-info-group-title { margin-top: 4px; }
        .cu-orders-modal-body .order-info-group.has-separator {

        .cu-orders-modal-body .order-info-field.full-width { grid-column: 1 / -1; }
        .cu-orders-modal-body .order-info-field label {
            font-size: 0.72rem;

        .cu-orders-modal-body .order-info-value {

        .cu-orders-modal-body .order-addresses-grid {

        .cu-orders-modal-body .order-info-value.payment-value {
            white-space: nowrap;

            max-width: 100%;
            font-weight: 600;

        .cu-orders-modal-body .order-info-note-input,
        .cu-orders-modal-body .order-info-note-field,
        .cu-orders-modal-body .order-info-note-raw,
        .cu-orders-modal-body .order-info-attr-input {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 11px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.86rem;
            line-height: 1.45;
            resize: vertical;
            background: #fff;
            color: #374151;

        .cu-orders-modal-body .order-info-note-input { min-height: 114px; }
        .cu-orders-modal-body .order-info-attr-input { min-height: 72px; }
        .cu-orders-modal-body .order-info-note-input:focus,
        .cu-orders-modal-body .order-info-note-field:focus,
        .cu-orders-modal-body .order-info-note-raw:focus,
        .cu-orders-modal-body .order-info-attr-input:focus {
            outline: none;

            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.12);

        .cu-orders-modal-body .order-info-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
        .cu-orders-modal-body .btn-save-order-info {
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .cu-orders-modal-body .btn-save-order-info:hover { background: #4338ca; }
        .cu-orders-modal-body .btn-save-order-info:disabled { opacity: 0.65; cursor: wait; }
        .cu-orders-modal-body .order-info-msg { font-size: 0.82rem; font-weight: 500; }
        .cu-orders-modal-body .order-info-msg.ok { color: #059669; }
        .cu-orders-modal-body .order-info-msg.err { color: #dc2626; }
        .cu-orders-modal-body .state-msg { padding: 40px 20px; text-align: center; color: #6b7280; }

        @media (max-width: 1400px) {
            .main-wrap { padding: 18px; }
            .list-card .cust-table { min-width: 820px; }
            .cust-table th, .cust-table td { padding-left: 12px; padding-right: 12px; }

            .controls-bar { flex-direction: column; align-items: stretch; gap: 12px; padding: 12px 14px; }
            .control-group { width: 100%; }

            .list-card .cust-table { min-width: 640px; }
            .cust-table .col-created,

        }

        @media (max-width: 768px) {
            .sidebar { width: 64px; }
            .sidebar .brand-text, .sidebar .app-tab span, .sidebar .dashboard-tab span { display: none; }
            .main-wrap { padding: 12px; }
            .toolbar-actions { width: 100%; margin-left: 0; }
            .toolbar-actions .btn-ghost { flex: 1; justify-content: center; }
            .count-pill { width: 100%; text-align: center; }
            .list-card .cust-table { min-width: 520px; }
            .cust-table .col-company { display: none; }
            .cu-edit-grid { grid-template-columns: 1fr; }
            .cu-edit-panel { padding: 12px 14px 14px; }
            .cu-edit-actions { flex-wrap: wrap; }
            .cu-edit-actions .btn-primary,
            .cu-edit-actions .btn-ghost { flex: 1; justify-content: center; min-width: 120px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand"><a href="/"><i class="fas fa-store"></i><span class="brand-text">BiteBoard</span></a></div>
            <nav class="sidebar-nav">
                <div class="app-tabs">
                    <a href="/app/All_Products" class="app-tab"><i class="fas fa-list"></i><span>All Products</span></a>
                    <a href="/app/Product_Creator" class="app-tab"><i class="fas fa-plus-circle"></i><span>Product Manager</span></a>
                    <a href="/app/Orders" class="app-tab"><i class="fas fa-box"></i><span>Orders</span></a>
                    <a href="/app/Customers" class="app-tab active"><i class="fas fa-users"></i><span>Customers</span></a>
                    <a href="/app/Artwork_Updater" class="app-tab"><i class="fas fa-palette"></i><span>Artwork Updater</span></a>
                    <a href="/app/Files" class="app-tab"><i class="fas fa-folder-open"></i><span>Files</span></a>
                    <a href="/app/Templates_Uploader" class="app-tab" style="display: none;"><i class="fas fa-file-archive"></i><span>Templates Uploader</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><a href="/" class="dashboard-tab"><i class="fas fa-home"></i><span>Dashboard</span></a></div>
        </aside>
        <script>(function(){if(window.location.pathname.indexOf('/app/')===0){var s=document.querySelector('.sidebar');if(s)s.classList.add('collapsed');}})();</script>

        <div class="main-wrap">
            <h1 class="page-title"><i class="fas fa-users"></i> Customers</h1>

            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="cu-search" placeholder="Search by name, email, company or tag…" autocomplete="off">
                </div>
                <span class="count-pill" id="cu-count">–</span>
                <div class="toolbar-actions">
                    <button type="button" class="btn-ghost" id="cu-refresh"><i class="fas fa-rotate"></i> Refresh</button>
                </div>
            </div>

            <div class="controls-bar">
                <div class="control-group">
                    <span class="control-label">Sort by</span>
                    <select id="cu-sort" class="control-select">
                        <option value="alpha">Alphabetical</option>
                        <option value="created">Created on</option>
                    </select>
                </div>
                <div class="control-group">
                    <span class="control-label">Filter by tag</span>
                    <div class="filter-checks">
                        <label class="filter-check">
                            <input type="checkbox" id="cu-filter-pending" value="pending">
                            <span class="tag-pill type-pending">Pending</span>
                        </label>
                        <label class="filter-check">
                            <input type="checkbox" id="cu-filter-trade" value="trade">
                            <span class="tag-pill type-trade">trade</span>
                        </label>
                        <label class="filter-check">
                            <input type="checkbox" id="cu-filter-end-customer" value="end-customer">
                            <span class="tag-pill type-end-customer">end-customer</span>
                        </label>
                        <label class="filter-check">
                            <input type="checkbox" id="cu-filter-unassigned" value="unassigned">
                            <span class="tag-pill type-unassigned">Unassigned</span>
                        </label>
                    </div>
                </div>
            </div>

            <div id="cu-flagged"></div>
            <div id="cu-content">
                <div class="state-msg">
                    <div class="spinner"></div>
                    Loading customers…
                </div>
            </div>
        </div>
    </div>

    <div id="cu-orders-modal" class="cu-orders-modal" aria-hidden="true">
        <div class="cu-orders-modal-backdrop" data-close-orders-modal></div>
        <div class="cu-orders-modal-panel" role="dialog" aria-modal="true" aria-labelledby="cu-orders-modal-title">
            <div class="cu-orders-modal-header">
                <h2 id="cu-orders-modal-title">Customer orders</h2>
                <button type="button" class="cu-orders-modal-close" data-close-orders-modal aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="cu-orders-modal-body" class="cu-orders-modal-body">
                <div class="state-msg"><div class="spinner"></div>Loading orders…</div>
            </div>
        </div>
    </div>

    <script>
        let CU_DATA = { customers: [], total: 0, conflict_count: 0 };
        let CU_SEARCH = '';
        let CU_SORT = 'alpha';
        let CU_FILTERS = { pending: false, trade: false, 'end-customer': false, unassigned: false };
        let CU_EXPANDED_ID = null;

        function escapeHtml(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }


        function customerIsUnassigned(c) {
            return !(c.matched_tags || []).length;
        }

        function customerHasTypeTag(c, typeKey) {
            return (c.matched_tags || []).some(t => String(t).toLowerCase() === typeKey);
        }

        function activeFilters() {
            return Object.entries(CU_FILTERS).filter(([, on]) => on).map(([key]) => key);
        }

        function customerMatchesFilters(c) {
            const filters = activeFilters();
            if (!filters.length) return true;
            return filters.some(key => {
                if (key === 'unassigned') return customerIsUnassigned(c);
                return customerHasTypeTag(c, key);
            });
        }

        function customerMatchesSearch(c) {
            if (!CU_SEARCH) return true;
            const hay = [
                c.name, c.first_name, c.last_name, c.email, c.company_name, c.invoice_address,
                c.landline_phone, c.mobile_number, c.phone,
                ...(c.tags || []), ...(c.matched_tags || [])
            ].join(' ').toLowerCase();
            return hay.includes(CU_SEARCH);
        }

        function formatCreatedAt(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '—';
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function displayField(value) {
            if (value == null || String(value).trim() === '') return '—';
            return escapeHtml(String(value).trim());
        }

        const TYPE_TAG_OPTIONS = [
            { value: 'trade', label: 'Trade Customer', shopifyTag: 'trade' },
            { value: 'end-customer', label: 'End Customer', shopifyTag: 'end-customer' },
            { value: 'pending', label: 'Pending Decision', shopifyTag: 'Pending' },
        ];

        function getCurrentTypeTagKey(c) {
            const matched = c.matched_tags || [];
            if (matched.length === 1) return String(matched[0]).toLowerCase();
            return '';
        }

        function otherTags(tags) {
            return (tags || []).filter(t =>
                !['pending', 'trade', 'end-customer'].includes(String(t).toLowerCase())
            );
        }

        function recalcConflictCount() {
            CU_DATA.conflict_count = (CU_DATA.customers || []).filter(c => c.tag_conflict).length;
        }

        function mergeCustomerUpdate(customerId, patch) {
            const idx = (CU_DATA.customers || []).findIndex(c => String(c.id) === String(customerId));
            if (idx < 0) return;
            CU_DATA.customers[idx] = { ...CU_DATA.customers[idx], ...patch };
            recalcConflictCount();
        }

        function typeTagSelectHtml(c) {
            const current = getCurrentTypeTagKey(c);
            const conflict = c.tag_conflict;
            const selectClass = [
                'cu-type-tag-select',
                conflict ? 'conflict' : '',
                !conflict && current === 'pending' ? 'pending' : '',
            ].filter(Boolean).join(' ');
            const options = [
                `<option value=""${current ? '' : ' selected'}>${conflict ? 'Fix conflict…' : '—'}</option>`,
                ...TYPE_TAG_OPTIONS.map(opt =>
                    `<option value="${escapeHtml(opt.value)}"${current === opt.value ? ' selected' : ''}>${escapeHtml(opt.label)}</option>`
                ),
            ].join('');
            const others = otherTags(c.tags);
            const otherHtml = others.length
                ? `<div class="other-tags">${others.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>`
                : '';
            return `<div class="tag-cell">
                <select class="${selectClass}" data-customer-id="${escapeHtml(c.id)}" aria-label="Customer Type">${options}</select>
                ${otherHtml}
            </div>`;
        }

        async function updateCustomerTypeTag(customerId, typeKey) {
            const idx = (CU_DATA.customers || []).findIndex(c => String(c.id) === String(customerId));
            if (idx < 0) return;
            const snapshot = {
                ...CU_DATA.customers[idx],
                tags: [...(CU_DATA.customers[idx].tags || [])],
                matched_tags: [...(CU_DATA.customers[idx].matched_tags || [])],
                tag_conflict: CU_DATA.customers[idx].tag_conflict,
            };
            const prevValue = snapshot.matched_tags.length === 1
                ? String(snapshot.matched_tags[0]).toLowerCase()
                : '';

            const kept = otherTags(snapshot.tags);
            const opt = TYPE_TAG_OPTIONS.find(o => o.value === typeKey);
            const shopifyTag = opt ? opt.shopifyTag : null;
            const optimisticTags = shopifyTag ? [...kept, shopifyTag] : kept;
            mergeCustomerUpdate(customerId, {
                tags: optimisticTags,
                matched_tags: shopifyTag ? [shopifyTag] : [],
                tag_conflict: false,
            });
            render();

            let selectEl = document.querySelector(`.cu-type-tag-select[data-customer-id="${customerId}"]`);
            if (selectEl) {
                selectEl.disabled = true;
                selectEl.classList.add('saving');
                selectEl.value = typeKey;
            }

            try {
                const resp = await fetch(`/api/customers/${customerId}/type-tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type_tag: typeKey || null }),
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data.success) {
                    throw new Error((data && data.error) ? data.error : 'Update failed');
                }
                mergeCustomerUpdate(customerId, data.customer);
                render();
            } catch (err) {
                mergeCustomerUpdate(customerId, {
                    tags: snapshot.tags,
                    matched_tags: snapshot.matched_tags,
                    tag_conflict: snapshot.tag_conflict,
                });
                render();
                selectEl = document.querySelector(`.cu-type-tag-select[data-customer-id="${customerId}"]`);
                if (selectEl) selectEl.value = prevValue;
                alert('Could not update tag: ' + (err.message || err));
            } finally {
                selectEl = document.querySelector(`.cu-type-tag-select[data-customer-id="${customerId}"]`);
                if (selectEl) {
                    selectEl.disabled = false;
                    selectEl.classList.remove('saving');
                }
            }
        }

        function typeTagSelectFieldHtml(c, fieldClass) {
            const current = getCurrentTypeTagKey(c);
            const conflict = c.tag_conflict;
            const classes = [
                fieldClass,
                !conflict && current === 'pending' ? 'pending' : '',
            ].filter(Boolean).join(' ');
            const options = [
                `<option value=""${current ? '' : ' selected'}>${conflict ? 'Fix conflict…' : '—'}</option>`,
                ...TYPE_TAG_OPTIONS.map(opt =>
                    `<option value="${escapeHtml(opt.value)}"${current === opt.value ? ' selected' : ''}>${escapeHtml(opt.label)}</option>`
                ),
            ].join('');
            return `<select name="type_tag" class="${classes}" aria-label="Customer Type">${options}</select>`;
        }

        function customerRowActionsHtml(c, expanded) {
            const chevron = expanded ? 'fa-chevron-up' : 'fa-chevron-down';
            const expandLabel = expanded ? 'Collapse customer' : 'Expand customer';
            const expandedAttr = expanded ? 'true' : 'false';
            return `<div class="cu-row-actions">
                <button type="button" class="cu-view-orders-btn" data-customer-id="${escapeHtml(c.id)}" data-customer-name="${escapeHtml(c.name || '')}" title="View all orders" aria-label="View all orders for ${escapeHtml(c.name || 'customer')}">
                    <i class="fas fa-box"></i>
                </button>
                <button type="button" class="cu-expand-btn" data-customer-id="${escapeHtml(c.id)}" aria-expanded="${expandedAttr}" aria-label="${expandLabel}">
                    <i class="fas ${chevron}"></i>
                </button>
            </div>`;
        }

        function customerDetailRowHtml(c) {
            const others = otherTags(c.tags);
            const otherHtml = others.length
                ? `<div class="cu-edit-field full-width"><label>Other tags</label><div class="other-tags">${others.map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div></div>`
                : '';
            return `<tr class="cu-detail-row${c.tag_conflict ? ' row-conflict' : ''}" data-customer-id="${escapeHtml(c.id)}">
                <td colspan="10">
                    <div class="cu-edit-panel">
                        <form class="cu-edit-form" data-customer-id="${escapeHtml(c.id)}">
                            <div class="cu-edit-grid">
                                <div class="cu-edit-field">
                                    <label for="cu-first-${escapeHtml(c.id)}">First name</label>
                                    <input class="cu-edit-input" id="cu-first-${escapeHtml(c.id)}" name="first_name" type="text" value="${escapeHtml(c.first_name || '')}">
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-last-${escapeHtml(c.id)}">Last name</label>
                                    <input class="cu-edit-input" id="cu-last-${escapeHtml(c.id)}" name="last_name" type="text" value="${escapeHtml(c.last_name || '')}">
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-email-${escapeHtml(c.id)}">Email</label>
                                    <input class="cu-edit-input" id="cu-email-${escapeHtml(c.id)}" name="email" type="email" value="${escapeHtml(c.email || '')}">
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-type-${escapeHtml(c.id)}">Customer Type</label>
                                    ${typeTagSelectFieldHtml(c, 'cu-edit-select')}
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-company-${escapeHtml(c.id)}">Company</label>
                                    <input class="cu-edit-input" id="cu-company-${escapeHtml(c.id)}" name="company_name" type="text" value="${escapeHtml(c.company_name || '')}">
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-landline-${escapeHtml(c.id)}">Landline</label>
                                    <input class="cu-edit-input" id="cu-landline-${escapeHtml(c.id)}" name="landline_phone" type="text" value="${escapeHtml(c.landline_phone || '')}">
                                </div>
                                <div class="cu-edit-field">
                                    <label for="cu-mobile-${escapeHtml(c.id)}">Mobile</label>
                                    <input class="cu-edit-input" id="cu-mobile-${escapeHtml(c.id)}" name="mobile_number" type="text" value="${escapeHtml(c.mobile_number || '')}">
                                </div>
                                <div class="cu-edit-field full-width">
                                    <label for="cu-invoice-${escapeHtml(c.id)}">Invoice address</label>
                                    <textarea class="cu-edit-textarea" id="cu-invoice-${escapeHtml(c.id)}" name="invoice_address">${escapeHtml(c.invoice_address || '')}</textarea>
                                </div>
                                ${otherHtml}
                            </div>
                            <div class="cu-edit-actions">
                                <button type="submit" class="btn-primary cu-save-btn"><i class="fas fa-check"></i> Save changes</button>
                                <button type="button" class="btn-ghost cu-edit-cancel">Cancel</button>
                            </div>
                        </form>
                    </div>
                </td>
            </tr>`;
        }

        async function saveCustomerDetails(customerId, formEl) {
            const saveBtn = formEl.querySelector('.cu-save-btn');
            const fd = new FormData(formEl);
            const body = {
                first_name: fd.get('first_name'),
                last_name: fd.get('last_name'),
                email: fd.get('email'),
                company_name: fd.get('company_name'),
                invoice_address: fd.get('invoice_address'),
                landline_phone: fd.get('landline_phone'),
                mobile_number: fd.get('mobile_number'),
                type_tag: fd.get('type_tag') || null,
            };
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
            }
            try {
                const resp = await fetch(`/api/customers/${customerId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data.success) {
                    throw new Error((data && data.error) ? data.error : 'Save failed');
                }
                mergeCustomerUpdate(customerId, data.customer);
                render();
            } catch (err) {
                alert('Could not save customer: ' + (err.message || err));
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fas fa-check"></i> Save changes';
                }
            }
        }

        function toggleExpand(customerId) {
            const id = String(customerId);
            CU_EXPANDED_ID = CU_EXPANDED_ID === id ? null : id;
            render();
        }

        function sortCustomers(list) {
            const sorted = list.slice();
            if (CU_SORT === 'created') {
                sorted.sort((a, b) => {
                    const ta = Date.parse(a.created_at || '') || 0;
                    const tb = Date.parse(b.created_at || '') || 0;
                    return tb - ta;
                });
            } else {
                sorted.sort((a, b) => (a.name || '').localeCompare(b.name || '', undefined, { sensitivity: 'base' }));
            }
            return sorted;
        }

        function getVisibleCustomers() {
            return sortCustomers(
                (CU_DATA.customers || []).filter(c => customerMatchesSearch(c) && customerMatchesFilters(c))
            );
        }

        function formatOrderDate(iso) {
            if (!iso) return '—';
            return iso.slice(0, 10);
        }

        function formatGbp(amount) {
            const val = parseFloat(String(amount ?? '').replace(/,/g, '')) || 0;
            return '£' + val.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatLinePrice(li) {
            if (li.price_display) return li.price_display;
            return `${formatGbp(li.unit_price)} × ${li.quantity} = ${formatGbp(li.total)}`;
        }

        function renderOrderLineItem(li) {
            let html = `<div class="detail-line"><div class="line-main"><div class="line-details">`;
            if (li.sku) html += `<div class="line-sku">${escapeHtml(li.sku)}</div>`;
            html += `<span class="line-title">${escapeHtml(li.title)}</span>`;
            if (li.meta_line) html += `<div class="line-meta">${escapeHtml(li.meta_line)}</div>`;
            if (li.properties && li.properties.length) {
                html += '<ul class="line-props">';
                li.properties.forEach(p => {
                    html += `<li><strong>${escapeHtml(p.key)}:</strong> ${escapeHtml(p.value)}</li>`;
                });
                html += '</ul>';
            }
            html += `</div><span class="line-price">${escapeHtml(formatLinePrice(li))}</span></div>`;
            if (li.line_number != null) {
                html += `<div class="office-tracking-host" data-line-number="${escapeHtml(li.line_number)}"></div>`;
            }
            html += '</div>';
            return html;
        }

        function renderOrderLineSection(title, items, emptyText) {
            let html = `<div class="detail-section"><h4>${escapeHtml(title)}</h4>`;
            if (items && items.length) {
                items.forEach(li => { html += renderOrderLineItem(li); });
            } else {
                html += `<p class="detail-empty">${escapeHtml(emptyText)}</p>`;
            }
            return html + '</div>';
        }

        function renderAddressBlock(label, address) {
            const text = (address && address.text) ? address.text : '';
            if (!text) {
                return `<div class="order-info-field"><label>${escapeHtml(label)}</label><div class="order-info-value empty">—</div></div>`;
            }
            return `<div class="order-info-field"><label>${escapeHtml(label)}</label><div class="order-info-value">${escapeHtml(text).replace(/\n/g, '<br>')}</div></div>`;
        }

        function renderOrderAddressesSection(o) {
            const shipping = o.shipping_address;
            const billing = o.billing_address;
            const payment = o.payment || {};
            const paymentLabel = payment.label || '—';
            const paymentDetail = payment.detail || '';
            if (!shipping && !billing && paymentLabel === '—') return '';
            let html = `<div class="detail-section order-addresses-section"><h4>Addresses &amp; payment</h4>
                <div class="order-info-panel"><div class="order-addresses-grid">`;
            html += renderAddressBlock('Shipping address', shipping);
            html += renderAddressBlock('Billing address', billing);
            html += `<div class="order-info-field"><label>Payment method</label>
                <div class="order-info-value payment-value${paymentLabel === '—' ? ' empty' : ''}">${escapeHtml(paymentLabel)}${paymentDetail ? `<div class="line-meta">${escapeHtml(paymentDetail)}</div>` : ''}</div></div>`;
            html += '</div></div></div>';
            return html;
        }

        function orderInfoFieldFullWidth(key, value) {
            const k = (key || '').replace(/:$/, '').trim().toLowerCase();
            if (k === 'name' || k === 'address') return false;
            if ((value || '').includes('\n')) return true;
            return /address|notes|comments|instructions|details/i.test(key);
        }

        function groupOrderInfoAttributes(attributes) {
            const sections = [];
            let current = null;
            attributes.forEach(attr => {
                const key = (attr.key || '').trim();
                const value = attr.value || '';
                const isHeading = key && !key.endsWith(':') && key === key.toUpperCase() && /[A-Z]/.test(key);
                if (isHeading) {
                    current = { heading: key, heading_value: value, fields: [] };
                    sections.push(current);
                    return;
                }
                if (!current) {
                    current = { heading: null, heading_value: '', fields: [] };
                    sections.push(current);
                }
                current.fields.push({
                    key,
                    value,
                    full_width: orderInfoFieldFullWidth(key, value),
                });
            });
            return sections;
        }

        function orderInfoFieldLabel(f) {
            return f.display_label || f.key || '';
        }

        function renderOrderInfoField(f, inputClass, keyAttr, hideLabel) {
            const fw = f.full_width ? ' full-width' : '';
            const rows = f.full_width ? 4 : 2;
            const restore = f.restore_heading ? ` data-restore-heading="${escapeHtml(f.restore_heading)}"` : '';
            const role = f.field_role ? ` data-field-role="${escapeHtml(f.field_role)}"` : '';
            return `<div class="order-info-field${fw}">
                ${hideLabel ? '' : `<label>${escapeHtml(orderInfoFieldLabel(f))}</label>`}
                <textarea class="${inputClass}" ${keyAttr}="${escapeHtml(f.key)}" rows="${rows}"${restore}${role}>${escapeHtml(f.value || '')}</textarea>
            </div>`;
        }

        function isAdditionalNotesHeading(heading) {
            return (heading || '').replace(/:$/, '').trim().toLowerCase() === 'additional notes';
        }

        function renderDateTopRow(sec, inputClass, keyAttr) {
            const fields = sec.fields || [];
            const cols = sec.field_count || fields.length || 1;
            let html = `<div class="order-info-group order-info-note-group" data-layout="date-top-row"><div class="order-info-top-dates" style="--top-date-cols: ${cols}">`;
            fields.forEach(f => {
                const restore = f.restore_heading ? ` data-restore-heading="${escapeHtml(f.restore_heading)}"` : '';
                const role = f.field_role ? ` data-field-role="${escapeHtml(f.field_role)}"` : '';
                html += `<div class="order-info-field">
                    <label>${escapeHtml(orderInfoFieldLabel(f))}</label>
                    <textarea class="${inputClass}" ${keyAttr}="${escapeHtml(f.key)}" rows="2"${restore}${role}>${escapeHtml(f.value || '')}</textarea>
                </div>`;
            });
            html += '</div></div>';
            return html;
        }

        function collectNoteSectionsFromForm(form) {
            const sections = [];
            form.querySelectorAll('.order-info-note-group').forEach(group => {
                if (group.dataset.layout === 'date-top-row') {
                    const fields = [];
                    group.querySelectorAll('.order-info-note-field').forEach(el => {
                        fields.push({
                            key: el.dataset.noteKey,
                            value: el.value,
                            restore_heading: el.dataset.restoreHeading || null,
                            field_role: el.dataset.fieldRole || null,
                        });
                    });
                    sections.push({ layout: 'date_top_row', heading: null, fields, field_count: fields.length });
                    return;
                }
                const heading = group.dataset.heading || null;
                const fields = [];
                group.querySelectorAll('.order-info-note-field').forEach(el => {
                    fields.push({ key: el.dataset.noteKey, value: el.value });
                });
                sections.push({ heading, fields });
            });
            return sections;
        }

        function renderOrderInfoSection(o) {
            const info = o.order_info || { note: '', note_sections: [], attributes: [], sections: [] };
            const noteSections = (info.note_sections && info.note_sections.length) ? info.note_sections : null;
            const attrSections = (info.sections && info.sections.length)
                ? info.sections
                : groupOrderInfoAttributes(info.attributes || []);
            let html = `<div class="detail-section order-info-section"><h4>Order info</h4>
                <form class="order-info-form" data-order-id="${escapeHtml(o.id)}">
                <div class="order-info-panel">`;
            if (noteSections) {
                noteSections.forEach(sec => {
                    if (sec.layout === 'date_top_row') {
                        html += renderDateTopRow(sec, 'order-info-note-field', 'data-note-key');
                        return;
                    }
                    const headingAttr = sec.heading ? ` data-heading="${escapeHtml(sec.heading)}"` : '';
                    const sepClass = sec.separator_before ? ' has-separator' : '';
                    const hideFieldLabel = isAdditionalNotesHeading(sec.heading) && (sec.fields || []).length === 1;
                    html += `<div class="order-info-group order-info-note-group${sepClass}"${headingAttr}>`;
                    if (sec.heading) html += `<h5 class="order-info-group-title">${escapeHtml(sec.heading)}</h5>`;
                    html += '<div class="order-info-grid">';
                    (sec.fields || []).forEach(f => { html += renderOrderInfoField(f, 'order-info-note-field', 'data-note-key', hideFieldLabel); });
                    html += '</div></div>';
                });
            } else {
                html += `<div class="order-info-grid"><div class="order-info-field full-width">
                    <label>Notes</label>
                    <textarea class="order-info-note-raw" name="note" rows="8">${escapeHtml(info.note || '')}</textarea>
                </div></div>`;
            }
            if (attrSections.length) {
                attrSections.forEach(sec => {
                    html += '<div class="order-info-group order-info-attr-group">';
                    if (sec.heading) {
                        html += `<h5 class="order-info-group-title">${escapeHtml(sec.heading)}</h5>`;
                        html += `<input type="hidden" class="order-info-attr-input" data-attr-key="${escapeHtml(sec.heading)}" value="${escapeHtml(sec.heading_value || '')}">`;
                    }
                    html += '<div class="order-info-grid">';
                    (sec.fields || []).forEach(f => { html += renderOrderInfoField(f, 'order-info-attr-input', 'data-attr-key'); });
                    html += '</div></div>';
                });
            }
            html += `</div><div class="order-info-actions">
                    <button type="submit" class="btn-save-order-info">Save order info</button>
                    <span class="order-info-msg" hidden></span>
                </div></form></div>`;
            return html;
        }

        async function saveOrderInfoForm(form) {
            const orderId = form.dataset.orderId;
            const btn = form.querySelector('.btn-save-order-info');
            const msg = form.querySelector('.order-info-msg');
            const noteGroups = form.querySelectorAll('.order-info-note-group');
            const rawNote = form.querySelector('.order-info-note-raw');
            const attributes = [];
            form.querySelectorAll('.order-info-attr-input').forEach(el => {
                attributes.push({ key: el.dataset.attrKey, value: el.value });
            });
            const payload = { attributes };
            if (noteGroups.length) {
                payload.note_sections = collectNoteSectionsFromForm(form);
            } else {
                payload.note = rawNote?.value ?? '';
            }
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Saving…';
            }
            if (msg) msg.hidden = true;
            try {
                const res = await fetch(`/api/orders/${encodeURIComponent(orderId)}/order-info`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Save failed');
                if (msg) {
                    msg.textContent = 'Order info saved.';
                    msg.className = 'order-info-msg ok';
                    msg.hidden = false;
                }
            } catch (err) {
                if (msg) {
                    msg.textContent = err.message || 'Could not save order info.';
                    msg.className = 'order-info-msg err';
                    msg.hidden = false;
                }
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Save order info';
                }
            }
        }

        function renderCustomerOrderDetails(o) {
            let html = '<div class="details-inner">';
            html += renderOrderLineSection('Items', o.order_items || [], 'No items');
            if (o.fees && o.fees.length) html += renderOrderLineSection('Fees', o.fees, '');
            html += renderOrderAddressesSection(o);
            html += renderOrderInfoSection(o);
            return html + '</div>';
        }

        let customerModalOrders = [];

        function renderCustomerOrdersTable(orders) {
            if (!orders.length) {
                return '<div class="state-msg">This customer has no orders yet.</div>';
            }
            let html = '<div class="list-card-scroll"><table><thead><tr><th>Order</th><th class="order-status-indicator-cell" aria-hidden="true"></th><th>Date</th><th>Total</th></tr></thead><tbody>';
            orders.forEach((o, i) => {
                html += `<tr class="data-row" data-order-idx="${i}" data-order-id="${escapeHtml(o.id)}">
                    <td><strong>${escapeHtml(o.name)}</strong><i class="fas fa-chevron-down order-chevron"></i></td>
                    <td class="order-status-indicator-cell"><span class="order-status-indicator-slot" data-order-id="${escapeHtml(o.id)}"></span></td>
                    <td>${escapeHtml(formatOrderDate(o.processed_at))}</td>
                    <td>${escapeHtml(o.total_display || formatGbp(o.total))}</td>
                </tr>
                <tr class="details-row" id="cu-order-details-${i}"><td colspan="4">${renderCustomerOrderDetails(o)}</td></tr>`;
            });
            return html + '</tbody></table></div>';
        }

        function closeCustomerOrdersModal() {
            const modal = document.getElementById('cu-orders-modal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        async function openCustomerOrdersModal(customerId, customerName) {
            const modal = document.getElementById('cu-orders-modal');
            const body = document.getElementById('cu-orders-modal-body');
            const title = document.getElementById('cu-orders-modal-title');
            title.textContent = customerName ? `Orders — ${customerName}` : 'Customer orders';
            body.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading orders…</div>';
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';

            try {
                const resp = await fetch(`/api/customers/${encodeURIComponent(customerId)}/orders`);
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data.success) {
                    throw new Error((data && data.error) ? data.error : 'Failed to load orders');
                }
                customerModalOrders = data.orders || [];
                body.innerHTML = renderCustomerOrdersTable(customerModalOrders);
                if (window.OfficeTracking && typeof OfficeTracking.loadOrderIndicatorsIn === 'function') OfficeTracking.loadOrderIndicatorsIn(body, '/api/orders');
                body.querySelectorAll('.data-row').forEach(row => {
                    row.addEventListener('click', () => {
                        const idx = row.getAttribute('data-order-idx');
                        const dr = document.getElementById('cu-order-details-' + idx);
                        if (dr) {
                            const isOpen = dr.classList.toggle('open');
                            row.classList.toggle('expanded', isOpen);
                            if (isOpen && row.dataset.orderId && window.OfficeTracking) {
                                const inner = dr.querySelector('.details-inner') || dr;
                                OfficeTracking.loadOrderTracking(row.dataset.orderId, '/api/orders', inner, 'staff');
                            }
                        }
                    });
                });
            } catch (err) {
                body.innerHTML = `<div class="state-msg error-msg">${escapeHtml(err.message || 'Failed to load orders')}</div>`;
            }
        }

        function customerSummaryRowHtml(c, expanded) {
            const email = c.email
                ? `<a class="cust-email" href="mailto:${escapeHtml(c.email)}">${escapeHtml(c.email)}</a>`
                : '—';
            const conflictIcon = c.tag_conflict
                ? `<i class="fas fa-triangle-exclamation conflict-icon" title="Multiple type tags"></i>`
                : '';
            const rowClass = ['cu-row', expanded ? 'expanded' : '', c.tag_conflict ? 'row-conflict' : ''].filter(Boolean).join(' ');
            return `<tr class="${rowClass}" data-customer-id="${escapeHtml(c.id)}">
                <td class="col-name"><span class="cust-name">${conflictIcon}${escapeHtml(c.name)}</span></td>
                <td class="col-email">${email}</td>
                <td class="col-company">${escapeHtml(c.company_name || '—')}</td>
                <td class="col-landline">${displayField(c.landline_phone)}</td>
                <td class="col-mobile">${displayField(c.mobile_number)}</td>
                <td class="col-tag">${typeTagSelectHtml(c)}</td>
                <td class="col-created">${formatCreatedAt(c.created_at)}</td>
                <td class="col-orders">${c.orders_count || 0}</td>
                <td class="col-spent">£${escapeHtml(c.total_spent || '0.00')}</td>
                <td class="cu-expand-cell col-expand">
                    ${customerRowActionsHtml(c, expanded)}
                </td>
            </tr>`;
        }

        function customerRowHtml(c) {
            const expanded = String(CU_EXPANDED_ID) === String(c.id);
            if (expanded) {
                return customerSummaryRowHtml(c, true) + customerDetailRowHtml(c);
            }
            return customerSummaryRowHtml(c, false);
        }

        function render() {
            const flaggedEl = document.getElementById('cu-flagged');
            const content = document.getElementById('cu-content');
            const visible = getVisibleCustomers();
            if (CU_EXPANDED_ID && !visible.some(c => String(c.id) === String(CU_EXPANDED_ID))) {
                CU_EXPANDED_ID = null;
            }
            const conflictCount = CU_DATA.conflict_count || 0;
            const filtersActive = activeFilters().length > 0;

            if (conflictCount > 0 && !CU_EXPANDED_ID) {
                flaggedEl.innerHTML = `<div class="alert-banner">
                    <strong><i class="fas fa-triangle-exclamation"></i>${conflictCount} customer${conflictCount === 1 ? '' : 's'} with conflicting tags</strong>
                    These customers have more than one of the tags <em>Pending</em>, <em>trade</em>, and <em>end-customer</em>. Each customer should only have one. They are highlighted in the list below.
                </div>`;
            } else {
                flaggedEl.innerHTML = '';
            }

            const rows = visible.length
                ? visible.map(customerRowHtml).join('')
                : `<tr><td colspan="10" class="empty-row">${CU_SEARCH || filtersActive ? 'No customers match your search or filters.' : 'No customers found.'}</td></tr>`;

            content.innerHTML = `<div class="list-card">
                <div class="list-card-scroll">
                <table class="cust-table">
                    <thead>
                        <tr>
                            <th class="col-name">Name</th>
                            <th class="col-email">Email</th>
                            <th class="col-company">Company</th>
                            <th class="col-landline">Landline</th>
                            <th class="col-mobile">Mobile</th>
                            <th class="col-tag">Customer Type</th>
                            <th class="col-created">Created</th>
                            <th class="col-orders">Orders</th>
                            <th class="col-spent">Total spent</th>
                            <th class="col-expand" aria-label="Expand"></th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                </div>
            </div>`;

            const total = CU_DATA.total || 0;
            const showing = visible.length;
            document.getElementById('cu-count').textContent =
                (CU_SEARCH || filtersActive) ? `${showing} of ${total}` : `${total} total`;
        }

        function applyControls() {
            CU_SEARCH = (document.getElementById('cu-search').value || '').trim().toLowerCase();
            CU_SORT = document.getElementById('cu-sort').value;
            CU_FILTERS = {
                pending: document.getElementById('cu-filter-pending').checked,
                trade: document.getElementById('cu-filter-trade').checked,
                'end-customer': document.getElementById('cu-filter-end-customer').checked,
                unassigned: document.getElementById('cu-filter-unassigned').checked,
            };
            render();
        }

        async function loadCustomers() {
            const content = document.getElementById('cu-content');
            document.getElementById('cu-flagged').innerHTML = '';
            content.innerHTML = `<div class="state-msg"><div class="spinner"></div>Loading customers…</div>`;
            try {
                const resp = await fetch('/api/customers');
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || data.success === false) {
                    throw new Error((data && data.error) ? data.error : ('Request failed: ' + resp.status));
                }
                CU_DATA = {
                    customers: data.customers || [],
                    total: data.total || 0,
                    conflict_count: data.conflict_count || 0,
                };
                render();
            } catch (err) {
                content.innerHTML = `<div class="state-msg error-msg"><i class="fas fa-triangle-exclamation"></i>${escapeHtml(err.message || 'Failed to load customers')}<br><br><button type="button" class="btn-ghost" onclick="loadCustomers()"><i class="fas fa-rotate"></i> Try again</button></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCustomers();
            document.getElementById('cu-search').addEventListener('input', applyControls);
            document.getElementById('cu-sort').addEventListener('change', applyControls);
            document.getElementById('cu-filter-pending').addEventListener('change', applyControls);
            document.getElementById('cu-filter-trade').addEventListener('change', applyControls);
            document.getElementById('cu-filter-end-customer').addEventListener('change', applyControls);
            document.getElementById('cu-filter-unassigned').addEventListener('change', applyControls);
            document.getElementById('cu-refresh').addEventListener('click', function() {
                CU_EXPANDED_ID = null;
                loadCustomers();
            });
            document.getElementById('cu-content').addEventListener('change', function(e) {
                const sel = e.target.closest('.cu-type-tag-select');
                if (!sel || sel.disabled) return;
                updateCustomerTypeTag(sel.dataset.customerId, sel.value);
            });
            document.getElementById('cu-content').addEventListener('click', function(e) {
                if (e.target.closest('.cu-type-tag-select')) {
                    e.stopPropagation();
                    return;
                }
                const ordersBtn = e.target.closest('.cu-view-orders-btn');
                if (ordersBtn) {
                    e.stopPropagation();
                    openCustomerOrdersModal(ordersBtn.dataset.customerId, ordersBtn.dataset.customerName);
                    return;
                }
                const cancelBtn = e.target.closest('.cu-edit-cancel');
                if (cancelBtn) {
                    CU_EXPANDED_ID = null;
                    render();
                    return;
                }
                const row = e.target.closest('tr.cu-row');
                if (row) {
                    if (e.target.closest('a')) return;
                    toggleExpand(row.dataset.customerId);
                }
            });
            document.getElementById('cu-orders-modal').addEventListener('click', function(e) {
                if (e.target.closest('[data-close-orders-modal]')) closeCustomerOrdersModal();
            });
            document.getElementById('cu-orders-modal-body').addEventListener('submit', function(e) {
                const form = e.target.closest('.order-info-form');
                if (!form) return;
                e.preventDefault();
                e.stopPropagation();
                saveOrderInfoForm(form);
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.getElementById('cu-orders-modal').classList.contains('open')) {
                    closeCustomerOrdersModal();
                }
            });
            document.getElementById('cu-content').addEventListener('submit', function(e) {
                const form = e.target.closest('.cu-edit-form');
                if (!form) return;
                e.preventDefault();
                saveCustomerDetails(form.dataset.customerId, form);
            });
        });
    </script>
    <script src="/static/office_tracking.js?v=11"></script>
</body>
</html>
