<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary - BiteBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/theme.css?v=4" rel="stylesheet">
    <link href="/static/diary.css?v=11" rel="stylesheet">
    <link href="/static/shipping.css?v=11" rel="stylesheet">
    <script src="/static/theme.js?v=1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f6f8fa; min-height: 100vh; color: #1f2937; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 230px; flex-shrink: 0; max-height: 100vh; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 16px 0; overflow: hidden; transition: width 0.2s ease; }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .brand-text, .sidebar.collapsed .app-tab span, .sidebar.collapsed .dashboard-tab span { display: none; }
        .sidebar.collapsed .sidebar-brand a, .sidebar.collapsed .app-tab, .sidebar.collapsed .dashboard-tab { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.collapsed:hover { width: 230px; }
        .sidebar.collapsed:hover .brand-text, .sidebar.collapsed:hover .app-tab span, .sidebar.collapsed:hover .dashboard-tab span { display: inline; }
        .sidebar.collapsed:hover .sidebar-brand a, .sidebar.collapsed:hover .app-tab, .sidebar.collapsed:hover .dashboard-tab { justify-content: flex-start; padding-left: 12px; padding-right: 12px; }
        .sidebar-brand { flex-shrink: 0; padding: 0 16px 16px; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
        .sidebar-brand a { font-size: 1.1rem; font-weight: 600; color: #111827; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .sidebar-brand a i { color: #4f46e5; }
        .sidebar-nav { flex: 1; min-height: 0; padding: 0 8px; overflow-x: hidden; overflow-y: auto; }
        .app-tabs { display: flex; flex-direction: column; gap: 2px; }
        .app-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: transparent; color: #374151; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; border: none; transition: background-color 0.15s, color 0.15s; width: 100%; text-align: left; }
        .app-tab:hover { background: #f3f4f6; color: #111827; }
        .app-tab.active { background: #4f46e5; color: #fff; }
        .app-tab i { font-size: 1rem; color: #6b7280; width: 20px; text-align: center; }
        .app-tab:hover i { color: #4f46e5; }
        .app-tab.active i { color: #fff; }
        .app-tab span { white-space: nowrap; }
        .sidebar-footer { flex-shrink: 0; padding: 12px 8px 0; border-top: 1px solid #e5e7eb; margin-top: auto; }
        .dashboard-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #4f46e5; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; transition: background-color 0.15s; width: 100%; justify-content: center; }
        .dashboard-tab:hover { background: #4338ca; }
        .main-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 24px; }
        .page-title { font-size: 1.25rem; font-weight: 600; color: #111827; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: #4f46e5; }
        .diary-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .count-pill { font-size: 0.8rem; color: #6b7280; background: #f3f4f6; padding: 6px 12px; border-radius: 999px; }
        .btn-ghost { border: 1px solid #e5e7eb; background: #fff; color: #374151; border-radius: 8px; padding: 8px 14px; font-size: 0.875rem; cursor: pointer; }
        .btn-ghost:hover { background: #f9fafb; }
        .btn-print { border: 1px solid #4f46e5; background: #4f46e5; color: #fff; border-radius: 8px; padding: 8px 14px; font-size: 0.875rem; cursor: pointer; }
        .btn-print:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand"><a href="/"><i class="fas fa-store"></i><span class="brand-text">BiteBoard</span></a></div>
            <nav class="sidebar-nav">
                <div class="app-tabs">
                    <a href="/app/All_Products" class="app-tab"><i class="fas fa-list"></i><span>All Products</span></a>
                    <a href="/app/Product_Creator" class="app-tab"><i class="fas fa-plus-circle"></i><span>Product Manager</span></a>
                    <a href="/app/Orders" class="app-tab"><i class="fas fa-box"></i><span>Orders</span></a>
                    <a href="/app/Diary" class="app-tab active"><i class="fas fa-calendar-days"></i><span>Diary</span></a>
                    <a href="/app/Customers" class="app-tab"><i class="fas fa-users"></i><span>Customers</span></a>
                    <a href="/app/Artwork_Updater" class="app-tab"><i class="fas fa-palette"></i><span>Artwork Updater</span></a>
                    <a href="/app/Files" class="app-tab"><i class="fas fa-folder-open"></i><span>Files</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><a href="/" class="dashboard-tab"><i class="fas fa-home"></i><span>Dashboard</span></a></div>
        </aside>
        <script>(function(){if(window.location.pathname.indexOf('/app/')===0){var s=document.querySelector('.sidebar');if(s)s.classList.add('collapsed');}})();</script>

        <div class="main-wrap diary-wrap">
            <h1 class="page-title"><i class="fas fa-calendar-days"></i> Diary</h1>
            <div class="diary-toolbar no-print">
                <span class="count-pill" id="diary-count-pill">Loading…</span>

                <div class="diary-toolbar-group">
                    <span class="diary-toolbar-label">Sort</span>
                    <select class="diary-select" id="diary-sort-select" aria-label="Sort diary"></select>
                </div>

                <div class="diary-toolbar-group">
                    <span class="diary-toolbar-label">View</span>
                    <div class="diary-view-toggle" role="group" aria-label="Diary view">
                        <button type="button" class="diary-view-btn" data-view="day">Day</button>
                        <button type="button" class="diary-view-btn" data-view="week">Week</button>
                        <button type="button" class="diary-view-btn" data-view="month">Month</button>
                    </div>
                </div>

                <div class="diary-toolbar-group">
                    <div class="diary-nav-core">
                        <button type="button" class="diary-nav-btn" id="diary-prev-btn" aria-label="Previous period"><i class="fas fa-chevron-left"></i></button>
                        <span class="diary-range-label" id="diary-range-label">—</span>
                        <button type="button" class="diary-nav-btn" id="diary-next-btn" aria-label="Next period"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <input type="date" class="diary-focus-input" id="diary-focus-input" aria-label="Jump to date">
                    <button type="button" class="btn-ghost" id="diary-today-btn">Today</button>
                </div>

                <div class="diary-toolbar-actions">
                    <button type="button" class="btn-print" id="diary-print-btn"><i class="fas fa-print"></i> Print</button>
                    <button type="button" class="btn-ghost" id="diary-refresh-btn"><i class="fas fa-rotate"></i> Refresh</button>
                </div>
            </div>
            <div id="diary-content"></div>
        </div>
    </div>
    <script src="/static/shipping.js?v=14"></script>
    <script src="/static/diary.js?v=22"></script>
</body>
</html>
