<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - BiteBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f6f8fa; min-height: 100vh; color: #1f2937; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 230px; flex-shrink: 0; max-height: 100vh; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 16px 0; overflow: hidden; transition: width 0.2s ease; }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .brand-text, .sidebar.collapsed .app-tab span, .sidebar.collapsed .dashboard-tab span { display: none; }
        .sidebar.collapsed .sidebar-brand a, .sidebar.collapsed .app-tab, .sidebar.collapsed .dashboard-tab { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.collapsed:hover { width: 230px; }
        .sidebar.collapsed:hover .brand-text, .sidebar.collapsed:hover .app-tab span, .sidebar.collapsed:hover .dashboard-tab span { display: inline; }
        .sidebar.collapsed:hover .sidebar-brand a, .sidebar.collapsed:hover .app-tab, .sidebar.collapsed:hover .dashboard-tab { justify-content: flex-start; padding-left: 12px; padding-right: 12px; }
        .sidebar-brand { flex-shrink: 0; padding: 0 16px 16px; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
        .sidebar-brand a { font-size: 1.1rem; font-weight: 600; color: #111827; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .sidebar-brand a i { color: #4f46e5; }
        .sidebar-nav { flex: 1; min-height: 0; padding: 0 8px; overflow-x: hidden; overflow-y: auto; }
        .app-tabs { display: flex; flex-direction: column; gap: 4px; }
        .app-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: transparent; color: #374151; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; width: 100%; }
        .app-tab:hover { background: #f3f4f6; color: #111827; }
        .app-tab.active { background: #4f46e5; color: #fff; }
        .app-tab i { font-size: 1rem; color: #6b7280; width: 20px; text-align: center; }
        .app-tab.active i, .app-tab:hover i { color: inherit; }
        .app-tab.active i { color: #fff; }
        .sidebar-footer { flex-shrink: 0; padding: 12px 8px 0; border-top: 1px solid #e5e7eb; margin-top: auto; }
        .dashboard-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #4f46e5; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; width: 100%; justify-content: center; }
        .main-wrap { flex: 1; min-width: 0; padding: 24px; }
        .page-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: #4f46e5; }
        .toolbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
        .search-box { position: relative; flex: 1; min-width: 240px; max-width: 460px; }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .search-box input { width: 100%; padding: 11px 14px 11px 38px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: #fff; }
        .search-box input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        .count-pill { background: #eef2ff; color: #4338ca; border-radius: 999px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; }
        .btn-ghost { background: #fff; border: 1px solid #e5e7eb; color: #374151; border-radius: 8px; padding: 9px 14px; font-size: 0.85rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
        .btn-ghost:hover { background: #f9fafb; }
        .list-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
        .list-card-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 780px; }
        th { text-align: left; font-size: 0.7rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; padding: 12px 16px; border-bottom: 1px solid #eef0f3; background: #f8fafc; white-space: nowrap; }
        td { font-size: 0.86rem; padding: 11px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tbody tr.data-row { cursor: pointer; }
        tbody tr.data-row:hover { background: #f9fafb; }
        tr.details-row { display: none; background: #fafafa; }
        tr.details-row.open { display: table-row; }
        tr.details-row td { padding: 0 !important; background: #f8fafc !important; border-bottom: 1px solid #e5e7eb; }
        .details-inner { padding: 16px 18px 18px; }
        .detail-section { margin-bottom: 16px; }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-section h4 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #9ca3af;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e5e7eb;
        }
        .detail-empty { font-size: 0.85rem; color: #9ca3af; font-style: italic; }
        .detail-line { padding: 10px 0; border-bottom: 1px solid #eef0f3; }
        .detail-line:last-child { border-bottom: none; }
        .line-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; font-size: 0.86rem; }
        .line-title { font-weight: 600; color: #111827; flex: 1; min-width: 0; }
        .line-price { font-weight: 600; white-space: nowrap; color: #111827; }
        .line-meta { font-size: 0.8rem; color: #6b7280; margin-top: 3px; }
        .line-props { list-style: none; margin: 8px 0 0; padding: 8px 0 0; border-top: 1px dashed #e5e7eb; }
        .line-props li { font-size: 0.8rem; color: #374151; padding: 2px 0; line-height: 1.4; }
        .line-props li strong { font-weight: 600; color: #6b7280; }
        .order-info-note { font-size: 0.86rem; line-height: 1.55; color: #374151; white-space: pre-wrap; margin-bottom: 8px; }
        .info-kv { font-size: 0.8rem; color: #374151; padding: 3px 0; line-height: 1.45; }
        .info-kv strong { font-weight: 600; color: #6b7280; }
        .data-row.expanded { background: #eef2ff; }
        .order-chevron { font-size: 0.65rem; color: #6b7280; margin-left: 6px; transition: transform 0.2s; }
        tr.data-row.expanded .order-chevron { transform: rotate(180deg); }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand"><a href="/"><i class="fas fa-store"></i><span class="brand-text">BiteBoard</span></a></div>
            <nav class="sidebar-nav">
                <div class="app-tabs">
                    <a href="/app/All_Products" class="app-tab"><i class="fas fa-list"></i><span>All Products</span></a>
                    <a href="/app/Product_Creator" class="app-tab"><i class="fas fa-plus-circle"></i><span>Product Manager</span></a>
                    <a href="/app/Orders" class="app-tab active"><i class="fas fa-box"></i><span>Orders</span></a>
                    <a href="/app/Customers" class="app-tab"><i class="fas fa-users"></i><span>Customers</span></a>
                    <a href="/app/Artwork_Updater" class="app-tab"><i class="fas fa-palette"></i><span>Artwork Updater</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><a href="/" class="dashboard-tab"><i class="fas fa-home"></i><span>Dashboard</span></a></div>
        </aside>
        <script>(function(){if(window.location.pathname.indexOf('/app/')===0){var s=document.querySelector('.sidebar');if(s)s.classList.add('collapsed');}})();</script>

        <div class="main-wrap">
            <h1 class="page-title"><i class="fas fa-box"></i> Orders</h1>
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search order, company, customer, email…">
                </div>
                <span class="count-pill" id="count-pill">Loading…</span>
                <button type="button" class="btn-ghost" id="refresh-btn"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
            <div class="list-card" id="content">
                <div class="state-msg"><i class="fas fa-spinner fa-spin"></i> Loading orders…</div>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];

        function escapeHtml(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '—';
            return iso.slice(0, 10);
        }

        function renderLineItem(li) {
            let html = `<div class="detail-line">
                <div class="line-main">
                    <span class="line-title">${escapeHtml(li.title)}</span>
                    <span class="line-price">${escapeHtml(li.currency)} ${escapeHtml(li.unit_price)} × ${escapeHtml(li.quantity)} = ${escapeHtml(li.currency)} ${escapeHtml(li.total)}</span>
                </div>`;
            if (li.meta_line) html += `<div class="line-meta">${escapeHtml(li.meta_line)}</div>`;
            if (li.properties && li.properties.length) {
                html += '<ul class="line-props">';
                li.properties.forEach(p => {
                    html += `<li><strong>${escapeHtml(p.key)}:</strong> ${escapeHtml(p.value)}</li>`;
                });
                html += '</ul>';
            }
            html += '</div>';
            return html;
        }

        function renderLineSection(title, items, emptyText) {
            let html = `<div class="detail-section"><h4>${escapeHtml(title)}</h4>`;
            if (items && items.length) {
                items.forEach(li => { html += renderLineItem(li); });
            } else {
                html += `<p class="detail-empty">${escapeHtml(emptyText)}</p>`;
            }
            html += '</div>';
            return html;
        }

        function renderOrderDetails(o) {
            let html = '<div class="details-inner">';
            html += renderLineSection('Items', o.order_items || [], 'No items');
            if (o.fees && o.fees.length) {
                html += renderLineSection('Fees', o.fees, '');
            }
            const info = o.order_info || {};
            const hasNote = !!(info.note || '').trim();
            const attrs = info.attributes || [];
            if (hasNote || attrs.length) {
                html += '<div class="detail-section"><h4>Order info</h4>';
                if (hasNote) html += `<div class="order-info-note">${escapeHtml(info.note)}</div>`;
                attrs.forEach(a => {
                    html += `<div class="info-kv"><strong>${escapeHtml(a.key)}:</strong> ${escapeHtml(a.value)}</div>`;
                });
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function renderTable(orders) {
            const content = document.getElementById('content');
            const pill = document.getElementById('count-pill');
            pill.textContent = orders.length + ' order' + (orders.length === 1 ? '' : 's');
            if (!orders.length) {
                content.innerHTML = '<div class="state-msg">No orders found.</div>';
                return;
            }
            let html = '<div class="list-card-scroll"><table><thead><tr><th>Order</th><th>Date</th><th>Company</th><th>Customer</th><th>Email</th><th>Total</th></tr></thead><tbody>';
            orders.forEach((o, i) => {
                html += `<tr class="data-row" data-idx="${i}">
                    <td><strong>${escapeHtml(o.name)}</strong><i class="fas fa-chevron-down order-chevron"></i></td>
                    <td>${escapeHtml(formatDate(o.processed_at))}</td>
                    <td>${escapeHtml(o.company || '—')}</td>
                    <td>${escapeHtml(o.customer_name || '—')}</td>
                    <td>${escapeHtml(o.customer_email || '—')}</td>
                    <td>${escapeHtml(o.currency)} ${escapeHtml(o.total)}</td>
                </tr>
                <tr class="details-row" id="details-${i}"><td colspan="6">${renderOrderDetails(o)}</td></tr>`;
            });
            html += '</tbody></table></div>';
            content.innerHTML = html;
            content.querySelectorAll('.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = row.getAttribute('data-idx');
                    const dr = document.getElementById('details-' + idx);
                    if (dr) {
                        const isOpen = dr.classList.toggle('open');
                        row.classList.toggle('expanded', isOpen);
                    }
                });
            });
        }

        function filterOrders(q) {
            const term = (q || '').trim().toLowerCase();
            if (!term) return allOrders;
            return allOrders.filter(o =>
                (o.name || '').toLowerCase().includes(term) ||
                (o.company || '').toLowerCase().includes(term) ||
                (o.customer_name || '').toLowerCase().includes(term) ||
                (o.customer_email || '').toLowerCase().includes(term)
            );
        }

        async function loadOrders() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="state-msg"><i class="fas fa-spinner fa-spin"></i> Loading orders…</div>';
            try {
                const res = await fetch('/api/orders');
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Failed to load orders');
                allOrders = data.orders || [];
                renderTable(filterOrders(document.getElementById('search-input').value));
            } catch (err) {
                content.innerHTML = `<div class="state-msg error">${escapeHtml(err.message)}</div>`;
                document.getElementById('count-pill').textContent = '0 orders';
            }
        }

        document.getElementById('search-input').addEventListener('input', function() {
            renderTable(filterOrders(this.value));
        });
        document.getElementById('refresh-btn').addEventListener('click', loadOrders);
        loadOrders();
    </script>
</body>
</html>
