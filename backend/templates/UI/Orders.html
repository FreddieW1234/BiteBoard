<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - BiteBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/office_tracking.css?v=4" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f6f8fa; min-height: 100vh; color: #1f2937; }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 230px; flex-shrink: 0; max-height: 100vh; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 16px 0; overflow: hidden; transition: width 0.2s ease; }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .brand-text, .sidebar.collapsed .app-tab span, .sidebar.collapsed .dashboard-tab span { display: none; }
        .sidebar.collapsed .sidebar-brand a, .sidebar.collapsed .app-tab, .sidebar.collapsed .dashboard-tab { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.collapsed:hover { width: 230px; }
        .sidebar.collapsed:hover .brand-text, .sidebar.collapsed:hover .app-tab span, .sidebar.collapsed:hover .dashboard-tab span { display: inline; }
        .sidebar.collapsed:hover .sidebar-brand a, .sidebar.collapsed:hover .app-tab, .sidebar.collapsed:hover .dashboard-tab { justify-content: flex-start; padding-left: 12px; padding-right: 12px; }
        .sidebar-brand { flex-shrink: 0; padding: 0 16px 16px; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
        .sidebar-brand a { font-size: 1.1rem; font-weight: 600; color: #111827; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .sidebar-brand a i { color: #4f46e5; }
        .sidebar-nav { flex: 1; min-height: 0; padding: 0 8px; overflow-x: hidden; overflow-y: auto; }
        .app-tabs { display: flex; flex-direction: column; gap: 4px; }
        .app-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: transparent; color: #374151; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; width: 100%; }
        .app-tab:hover { background: #f3f4f6; color: #111827; }
        .app-tab.active { background: #4f46e5; color: #fff; }
        .app-tab i { font-size: 1rem; color: #6b7280; width: 20px; text-align: center; }
        .app-tab.active i, .app-tab:hover i { color: inherit; }
        .app-tab.active i { color: #fff; }
        .sidebar-footer { flex-shrink: 0; padding: 12px 8px 0; border-top: 1px solid #e5e7eb; margin-top: auto; }
        .dashboard-tab { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #4f46e5; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; width: 100%; justify-content: center; }
        .main-wrap { flex: 1; min-width: 0; padding: 24px; }
        .page-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: #4f46e5; }
        .toolbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
        .search-box { position: relative; flex: 1; min-width: 240px; max-width: 460px; }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .search-box input { width: 100%; padding: 11px 14px 11px 38px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: #fff; }
        .search-box input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        .count-pill { background: #eef2ff; color: #4338ca; border-radius: 999px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; }
        .btn-ghost { background: #fff; border: 1px solid #e5e7eb; color: #374151; border-radius: 8px; padding: 9px 14px; font-size: 0.85rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
        .btn-ghost:hover { background: #f9fafb; }
        .list-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
        .list-card-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 980px; }
        th { text-align: left; font-size: 0.7rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; padding: 12px 16px; border-bottom: 1px solid #eef0f3; background: #f8fafc; white-space: nowrap; }
        td { font-size: 0.86rem; padding: 11px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tbody tr.data-row { cursor: pointer; }
        tbody tr.data-row:hover { background: #f9fafb; }
        tr.details-row { display: none; background: #fafafa; }
        tr.details-row.open { display: table-row; }
        tr.details-row td { padding: 0 !important; background: #f8fafc !important; border-bottom: 1px solid #e5e7eb; }
        .details-inner { padding: 16px 18px 18px; }
        .detail-section { margin-bottom: 16px; }
        .detail-section:last-child { margin-bottom: 0; }
        .detail-section h4 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #9ca3af;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e5e7eb;
        }
        .detail-empty { font-size: 0.85rem; color: #9ca3af; font-style: italic; }
        .detail-line { padding: 10px 0; border-bottom: 1px solid #eef0f3; }
        .detail-line:last-child { border-bottom: none; }
        .line-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; font-size: 0.86rem; }
        .line-details { flex: 1; min-width: 0; }
        .line-sku { font-size: 0.75rem; font-weight: 600; color: #6b7280; letter-spacing: 0.02em; margin-bottom: 2px; }
        .line-title { font-weight: 600; color: #111827; display: block; }
        .line-price { font-weight: 600; white-space: nowrap; color: #111827; }
        .line-meta { font-size: 0.8rem; color: #6b7280; margin-top: 3px; }
        .line-props { list-style: none; margin: 8px 0 0; padding: 8px 0 0; border-top: 1px dashed #e5e7eb; }
        .line-props li { font-size: 0.8rem; color: #374151; padding: 2px 0; line-height: 1.4; }
        .line-props li strong { font-weight: 600; color: #6b7280; }
        .order-info-note { font-size: 0.86rem; line-height: 1.55; color: #374151; white-space: pre-wrap; margin-bottom: 8px; }
        .info-kv { font-size: 0.8rem; color: #374151; padding: 3px 0; line-height: 1.45; }
        .info-kv strong { font-weight: 600; color: #6b7280; }
        .data-row.expanded { background: #eef2ff; }
        .order-chevron { font-size: 0.65rem; color: #6b7280; margin-left: 6px; transition: transform 0.2s; }
        tr.data-row.expanded .order-chevron { transform: rotate(180deg); }
        .order-info-panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px 18px 18px;
        }
        .order-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 18px;
        }
        .order-info-top-dates {
            display: grid;
            grid-template-columns: repeat(var(--top-date-cols, 2), minmax(0, 1fr));
            gap: 14px 18px;
            align-items: start;
        }
        .order-info-top-dates .order-info-field {
            min-width: 0;
        }
        .order-info-top-dates .order-info-field label {
            font-size: 0.65rem;
            line-height: 1.35;
            word-break: break-word;
        }
        .order-info-top-dates textarea {
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .order-info-top-dates {
                grid-template-columns: repeat(var(--top-date-cols, 2), minmax(88px, 1fr));
                overflow-x: auto;
            }
        }
        .order-info-group { margin-bottom: 16px; }
        .order-info-group:last-child { margin-bottom: 0; }
        .order-info-group-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #9ca3af;
            margin: 0 0 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e5e7eb;
        }
        .order-info-group + .order-info-group .order-info-group-title { margin-top: 4px; }
        .order-info-group.has-separator {
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
            margin-top: 16px;
        }
        .order-info-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .order-info-field.full-width { grid-column: 1 / -1; }
        .order-info-field label {
            font-size: 0.72rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .order-info-value {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 11px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.86rem;
            line-height: 1.45;
            background: #f9fafb;
            color: #374151;
            white-space: pre-wrap;
            min-height: 2.5rem;
        }
        .order-info-value.empty { color: #9ca3af; font-style: italic; }
        .order-addresses-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px 18px;
            align-items: start;
        }
        .order-addresses-grid .order-info-field { min-width: 0; }
        .order-info-value.payment-value {
            white-space: nowrap;
            min-height: unset;
            width: fit-content;
            max-width: 100%;
            font-weight: 600;
        }
        .order-info-note-input,
        .order-info-note-field,
        .order-info-note-raw,
        .order-info-attr-input {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 11px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.86rem;
            line-height: 1.45;
            resize: vertical;
            background: #fff;
            color: #374151;
        }
        .order-info-note-input { min-height: 114px; }
        .order-info-attr-input { min-height: 72px; }
        .order-info-note-input:focus,
        .order-info-note-field:focus,
        .order-info-note-raw:focus,
        .order-info-attr-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.12);
        }
        .order-info-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
        .btn-save-order-info {
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-save-order-info:hover { background: #4338ca; }
        .btn-save-order-info:disabled { opacity: 0.65; cursor: wait; }
        .order-info-msg { font-size: 0.82rem; font-weight: 500; }
        .order-info-msg.ok { color: #059669; }
        .order-info-msg.err { color: #dc2626; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand"><a href="/"><i class="fas fa-store"></i><span class="brand-text">BiteBoard</span></a></div>
            <nav class="sidebar-nav">
                <div class="app-tabs">
                    <a href="/app/All_Products" class="app-tab"><i class="fas fa-list"></i><span>All Products</span></a>
                    <a href="/app/Product_Creator" class="app-tab"><i class="fas fa-plus-circle"></i><span>Product Manager</span></a>
                    <a href="/app/Orders" class="app-tab active"><i class="fas fa-box"></i><span>Orders</span></a>
                    <a href="/app/Customers" class="app-tab"><i class="fas fa-users"></i><span>Customers</span></a>
                    <a href="/app/Artwork_Updater" class="app-tab"><i class="fas fa-palette"></i><span>Artwork Updater</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><a href="/" class="dashboard-tab"><i class="fas fa-home"></i><span>Dashboard</span></a></div>
        </aside>
        <script>(function(){if(window.location.pathname.indexOf('/app/')===0){var s=document.querySelector('.sidebar');if(s)s.classList.add('collapsed');}})();</script>

        <div class="main-wrap">
            <h1 class="page-title"><i class="fas fa-box"></i> Orders</h1>
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search order, company, customer, email…">
                </div>
                <span class="count-pill" id="count-pill">Loading…</span>
                <button type="button" class="btn-ghost" id="refresh-btn"><i class="fas fa-rotate"></i> Refresh</button>
            </div>
            <div class="list-card" id="content">
                <div class="state-msg"><i class="fas fa-spinner fa-spin"></i> Loading orders…</div>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];

        function escapeHtml(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '—';
            return iso.slice(0, 10);
        }

        function formatGbp(amount) {
            const val = parseFloat(String(amount ?? '').replace(/,/g, '')) || 0;
            return '£' + val.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatLinePrice(li) {
            if (li.price_display) return li.price_display;
            return `${formatGbp(li.unit_price)} × ${li.quantity} = ${formatGbp(li.total)}`;
        }

        function renderLineItem(li) {
            let html = `<div class="detail-line">
                <div class="line-main">
                    <div class="line-details">`;
            if (li.sku) html += `<div class="line-sku">${escapeHtml(li.sku)}</div>`;
            html += `<span class="line-title">${escapeHtml(li.title)}</span>`;
            if (li.meta_line) html += `<div class="line-meta">${escapeHtml(li.meta_line)}</div>`;
            if (li.properties && li.properties.length) {
                html += '<ul class="line-props">';
                li.properties.forEach(p => {
                    html += `<li><strong>${escapeHtml(p.key)}:</strong> ${escapeHtml(p.value)}</li>`;
                });
                html += '</ul>';
            }
            html += `</div>
                    <span class="line-price">${escapeHtml(formatLinePrice(li))}</span>
                </div>`;
            if (li.line_number != null) {
                html += `<div class="office-tracking-host" data-line-number="${escapeHtml(li.line_number)}"></div>`;
            }
            html += '</div>';
            return html;
        }

        function renderLineSection(title, items, emptyText) {
            let html = `<div class="detail-section"><h4>${escapeHtml(title)}</h4>`;
            if (items && items.length) {
                items.forEach(li => { html += renderLineItem(li); });
            } else {
                html += `<p class="detail-empty">${escapeHtml(emptyText)}</p>`;
            }
            html += '</div>';
            return html;
        }

        function renderAddressBlock(label, address) {
            const text = (address && address.text) ? address.text : '';
            if (!text) {
                return `<div class="order-info-field"><label>${escapeHtml(label)}</label><div class="order-info-value empty">—</div></div>`;
            }
            return `<div class="order-info-field"><label>${escapeHtml(label)}</label><div class="order-info-value">${escapeHtml(text).replace(/\n/g, '<br>')}</div></div>`;
        }

        function renderOrderAddressesSection(o) {
            const shipping = o.shipping_address;
            const billing = o.billing_address;
            const payment = o.payment || {};
            const paymentLabel = payment.label || '—';
            const paymentDetail = payment.detail || '';
            if (!shipping && !billing && paymentLabel === '—') return '';
            let html = `<div class="detail-section order-addresses-section"><h4>Addresses &amp; payment</h4>
                <div class="order-info-panel"><div class="order-addresses-grid">`;
            html += renderAddressBlock('Shipping address', shipping);
            html += renderAddressBlock('Billing address', billing);
            html += `<div class="order-info-field"><label>Payment method</label>
                <div class="order-info-value payment-value${paymentLabel === '—' ? ' empty' : ''}">${escapeHtml(paymentLabel)}${paymentDetail ? `<div class="line-meta">${escapeHtml(paymentDetail)}</div>` : ''}</div></div>`;
            html += '</div></div></div>';
            return html;
        }

        function orderInfoFieldFullWidth(key, value) {
            const k = (key || '').replace(/:$/, '').trim().toLowerCase();
            if (k === 'name' || k === 'address') return false;
            if ((value || '').includes('\n')) return true;
            return /address|notes|comments|instructions|details/i.test(key);
        }

        function groupOrderInfoAttributes(attributes) {
            const sections = [];
            let current = null;
            attributes.forEach(attr => {
                const key = (attr.key || '').trim();
                const value = attr.value || '';
                const isHeading = key && !key.endsWith(':') && key === key.toUpperCase() && /[A-Z]/.test(key);
                if (isHeading) {
                    current = { heading: key, heading_value: value, fields: [] };
                    sections.push(current);
                    return;
                }
                if (!current) {
                    current = { heading: null, heading_value: '', fields: [] };
                    sections.push(current);
                }
                current.fields.push({
                    key,
                    value,
                    full_width: orderInfoFieldFullWidth(key, value),
                });
            });
            return sections;
        }

        function orderInfoFieldLabel(f) {
            return f.display_label || f.key || '';
        }

        function renderOrderInfoField(f, inputClass, keyAttr, hideLabel) {
            const fw = f.full_width ? ' full-width' : '';
            const rows = f.full_width ? 4 : 2;
            const restore = f.restore_heading ? ` data-restore-heading="${escapeHtml(f.restore_heading)}"` : '';
            const role = f.field_role ? ` data-field-role="${escapeHtml(f.field_role)}"` : '';
            return `<div class="order-info-field${fw}">
                ${hideLabel ? '' : `<label>${escapeHtml(orderInfoFieldLabel(f))}</label>`}
                <textarea class="${inputClass}" ${keyAttr}="${escapeHtml(f.key)}" rows="${rows}"${restore}${role}>${escapeHtml(f.value || '')}</textarea>
            </div>`;
        }

        function isAdditionalNotesHeading(heading) {
            return (heading || '').replace(/:$/, '').trim().toLowerCase() === 'additional notes';
        }

        function renderDateTopRow(sec, inputClass, keyAttr) {
            const fields = sec.fields || [];
            const cols = sec.field_count || fields.length || 1;
            let html = `<div class="order-info-group order-info-note-group" data-layout="date-top-row"><div class="order-info-top-dates" style="--top-date-cols: ${cols}">`;
            fields.forEach(f => {
                const restore = f.restore_heading ? ` data-restore-heading="${escapeHtml(f.restore_heading)}"` : '';
                const role = f.field_role ? ` data-field-role="${escapeHtml(f.field_role)}"` : '';
                html += `<div class="order-info-field">
                    <label>${escapeHtml(orderInfoFieldLabel(f))}</label>
                    <textarea class="${inputClass}" ${keyAttr}="${escapeHtml(f.key)}" rows="2"${restore}${role}>${escapeHtml(f.value || '')}</textarea>
                </div>`;
            });
            html += '</div></div>';
            return html;
        }

        function collectNoteSectionsFromForm(form) {
            const sections = [];
            form.querySelectorAll('.order-info-note-group').forEach(group => {
                if (group.dataset.layout === 'date-top-row') {
                    const fields = [];
                    group.querySelectorAll('.order-info-note-field').forEach(el => {
                        fields.push({
                            key: el.dataset.noteKey,
                            value: el.value,
                            restore_heading: el.dataset.restoreHeading || null,
                            field_role: el.dataset.fieldRole || null,
                        });
                    });
                    sections.push({ layout: 'date_top_row', heading: null, fields, field_count: fields.length });
                    return;
                }
                const heading = group.dataset.heading || null;
                const fields = [];
                group.querySelectorAll('.order-info-note-field').forEach(el => {
                    fields.push({ key: el.dataset.noteKey, value: el.value });
                });
                sections.push({ heading, fields });
            });
            return sections;
        }

        function renderOrderInfoSection(o, apiPrefix = '/api/orders') {
            const info = o.order_info || { note: '', note_sections: [], attributes: [], sections: [] };
            const noteSections = (info.note_sections && info.note_sections.length)
                ? info.note_sections
                : null;
            const attrSections = (info.sections && info.sections.length)
                ? info.sections
                : groupOrderInfoAttributes(info.attributes || []);
            let html = `<div class="detail-section order-info-section"><h4>Order info</h4>
                <form class="order-info-form" data-order-id="${escapeHtml(o.id)}" data-api-prefix="${apiPrefix}">
                <div class="order-info-panel">`;
            if (noteSections) {
                noteSections.forEach(sec => {
                    if (sec.layout === 'date_top_row') {
                        html += renderDateTopRow(sec, 'order-info-note-field', 'data-note-key');
                        return;
                    }
                    const headingAttr = sec.heading ? ` data-heading="${escapeHtml(sec.heading)}"` : '';
                    const sepClass = sec.separator_before ? ' has-separator' : '';
                    const hideFieldLabel = isAdditionalNotesHeading(sec.heading) && (sec.fields || []).length === 1;
                    html += `<div class="order-info-group order-info-note-group${sepClass}"${headingAttr}>`;
                    if (sec.heading) html += `<h5 class="order-info-group-title">${escapeHtml(sec.heading)}</h5>`;
                    html += '<div class="order-info-grid">';
                    (sec.fields || []).forEach(f => { html += renderOrderInfoField(f, 'order-info-note-field', 'data-note-key', hideFieldLabel); });
                    html += '</div></div>';
                });
            } else {
                html += `<div class="order-info-grid"><div class="order-info-field full-width">
                    <label>Notes</label>
                    <textarea class="order-info-note-raw" name="note" rows="8">${escapeHtml(info.note || '')}</textarea>
                </div></div>`;
            }
            if (attrSections.length) {
                attrSections.forEach(sec => {
                    html += '<div class="order-info-group order-info-attr-group">';
                    if (sec.heading) {
                        html += `<h5 class="order-info-group-title">${escapeHtml(sec.heading)}</h5>`;
                        html += `<input type="hidden" class="order-info-attr-input" data-attr-key="${escapeHtml(sec.heading)}" value="${escapeHtml(sec.heading_value || '')}">`;
                    }
                    html += '<div class="order-info-grid">';
                    (sec.fields || []).forEach(f => { html += renderOrderInfoField(f, 'order-info-attr-input', 'data-attr-key'); });
                    html += '</div></div>';
                });
            }
            html += `</div><div class="order-info-actions">
                    <button type="submit" class="btn-save-order-info">Save order info</button>
                    <span class="order-info-msg" hidden></span>
                </div></form></div>`;
            return html;
        }

        function renderOrderDetails(o) {
            let html = '<div class="details-inner">';
            html += renderLineSection('Items', o.order_items || [], 'No items');
            if (o.fees && o.fees.length) {
                html += renderLineSection('Fees', o.fees, '');
            }
            html += renderOrderAddressesSection(o);
            html += renderOrderInfoSection(o);
            html += '</div>';
            return html;
        }

        async function saveOrderInfoForm(form) {
            const orderId = form.dataset.orderId;
            const prefix = form.dataset.apiPrefix || '/api/orders';
            const btn = form.querySelector('.btn-save-order-info');
            const msg = form.querySelector('.order-info-msg');
            const noteGroups = form.querySelectorAll('.order-info-note-group');
            const rawNote = form.querySelector('.order-info-note-raw');
            const attributes = [];
            form.querySelectorAll('.order-info-attr-input').forEach(el => {
                attributes.push({ key: el.dataset.attrKey, value: el.value });
            });
            const payload = { attributes };
            if (noteGroups.length) {
                payload.note_sections = collectNoteSectionsFromForm(form);
            } else {
                payload.note = rawNote?.value ?? '';
            }
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Saving…';
            }
            if (msg) msg.hidden = true;
            try {
                const res = await fetch(`${prefix}/${encodeURIComponent(orderId)}/order-info`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Save failed');
                if (msg) {
                    msg.textContent = 'Order info saved.';
                    msg.className = 'order-info-msg ok';
                    msg.hidden = false;
                }
            } catch (err) {
                if (msg) {
                    msg.textContent = err.message || 'Could not save order info.';
                    msg.className = 'order-info-msg err';
                    msg.hidden = false;
                }
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Save order info';
                }
            }
        }

        function renderTable(orders) {
            const content = document.getElementById('content');
            const pill = document.getElementById('count-pill');
            pill.textContent = orders.length + ' order' + (orders.length === 1 ? '' : 's');
            if (!orders.length) {
                content.innerHTML = '<div class="state-msg">No orders found.</div>';
                return;
            }
            let html = '<div class="list-card-scroll"><table><thead><tr><th>Order</th><th class="order-status-indicator-cell" aria-hidden="true"></th><th>Date</th><th>Company</th><th>Customer</th><th>Email</th><th>Landline</th><th>Mobile</th><th>Total</th></tr></thead><tbody>';
            orders.forEach((o, i) => {
                html += `<tr class="data-row" data-idx="${i}" data-order-id="${escapeHtml(o.id)}">
                    <td><strong>${escapeHtml(o.name)}</strong><i class="fas fa-chevron-down order-chevron"></i></td>
                    <td class="order-status-indicator-cell"><span class="order-status-indicator-slot" data-order-id="${escapeHtml(o.id)}"></span></td>
                    <td>${escapeHtml(formatDate(o.processed_at))}</td>
                    <td>${escapeHtml(o.company || '—')}</td>
                    <td>${escapeHtml(o.customer_name || '—')}</td>
                    <td>${escapeHtml(o.customer_email || '—')}</td>
                    <td>${escapeHtml(o.landline_phone || '—')}</td>
                    <td>${escapeHtml(o.mobile_number || '—')}</td>
                    <td>${escapeHtml(o.total_display || formatGbp(o.total))}</td>
                </tr>
                <tr class="details-row" id="details-${i}"><td colspan="9">${renderOrderDetails(o)}</td></tr>`;
            });
            html += '</tbody></table></div>';
            content.innerHTML = html;
            if (window.OfficeTracking && typeof OfficeTracking.loadOrderIndicatorsIn === 'function') OfficeTracking.loadOrderIndicatorsIn(content, '/api/orders');
            content.querySelectorAll('.data-row').forEach(row => {
                row.addEventListener('click', () => {
                    const idx = row.getAttribute('data-idx');
                    const dr = document.getElementById('details-' + idx);
                    if (dr) {
                        const isOpen = dr.classList.toggle('open');
                        row.classList.toggle('expanded', isOpen);
                        if (isOpen && row.dataset.orderId && window.OfficeTracking) {
                            const inner = dr.querySelector('.details-inner') || dr;
                            OfficeTracking.loadOrderTracking(row.dataset.orderId, '/api/orders', inner, 'staff');
                        }
                    }
                });
            });
        }

        function filterOrders(q) {
            const term = (q || '').trim().toLowerCase();
            if (!term) return allOrders;
            return allOrders.filter(o =>
                (o.name || '').toLowerCase().includes(term) ||
                (o.company || '').toLowerCase().includes(term) ||
                (o.customer_name || '').toLowerCase().includes(term) ||
                (o.customer_email || '').toLowerCase().includes(term) ||
                (o.landline_phone || '').toLowerCase().includes(term) ||
                (o.mobile_number || '').toLowerCase().includes(term)
            );
        }

        async function loadOrders() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="state-msg"><i class="fas fa-spinner fa-spin"></i> Loading orders…</div>';
            try {
                const res = await fetch('/api/orders');
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Failed to load orders');
                allOrders = data.orders || [];
                renderTable(filterOrders(document.getElementById('search-input').value));
            } catch (err) {
                content.innerHTML = `<div class="state-msg error">${escapeHtml(err.message)}</div>`;
                document.getElementById('count-pill').textContent = '0 orders';
            }
        }

        document.getElementById('content').addEventListener('submit', function(e) {
            const form = e.target.closest('.order-info-form');
            if (!form) return;
            e.preventDefault();
            e.stopPropagation();
            saveOrderInfoForm(form);
        });
        document.getElementById('search-input').addEventListener('input', function() {
            renderTable(filterOrders(this.value));
        });
        document.getElementById('refresh-btn').addEventListener('click', loadOrders);
        loadOrders();
    </script>
    <script src="/static/office_tracking.js?v=5"></script>
</body>
</html>
